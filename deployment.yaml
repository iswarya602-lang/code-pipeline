apiVersion: apps/v1
kind: Deployment

metadata:
  name: food-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: food-app

  template:
    metadata:
      labels:
        app: food-app

    spec:
      containers:
      - name: food-app

        image: 155409188015.dkr.ecr.ap-south-1.amazonaws.com/food-website:latest

        ports:
        - containerPort: 80
